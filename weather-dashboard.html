<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .quick-cities {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .city-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .city-btn:hover {
            background: white;
            color: #667eea;
        }

        .main-weather {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            text-align: center;
        }

        .city-name {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .current-temp {
            font-size: 64px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .weather-description {
            font-size: 20px;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 80px;
            margin: 20px 0;
            color: #667eea;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .detail-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .forecast-section {
            margin-top: 30px;
        }

        .forecast-title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .forecast-day {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .forecast-icon {
            font-size: 40px;
            margin: 10px 0;
            color: #667eea;
        }

        .forecast-temp {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .forecast-desc {
            font-size: 12px;
            color: #666;
            text-transform: capitalize;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 20px;
            padding: 40px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .current-temp {
                font-size: 48px;
            }

            .weather-icon {
                font-size: 60px;
            }

            .main-weather {
                padding: 20px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
            }
        }

        .last-updated {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.8;
        }

        .api-note {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-cloud-sun"></i>
                Weather Dashboard
            </h1>
            <p>Get real-time weather information for any city</p>
        </div>

        <div class="api-note">
            <i class="fas fa-info-circle"></i> Using OpenWeatherMap API - Free tier (limited to current weather and 5-day forecast)
        </div>

        <div class="error" id="error"></div>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button class="search-btn" id="searchBtn">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>

        <div class="quick-cities">
            <button class="city-btn" onclick="searchCity('Manila')">Manila</button>
            <button class="city-btn" onclick="searchCity('New York')">New York</button>
            <button class="city-btn" onclick="searchCity('London')">London</button>
            <button class="city-btn" onclick="searchCity('Tokyo')">Tokyo</button>
            <button class="city-btn" onclick="searchCity('Sydney')">Sydney</button>
        </div>

        <div id="mainWeather" class="hidden">
            <div class="main-weather">
                <div class="city-name" id="cityName"></div>
                <div class="weather-icon" id="weatherIcon"></div>
                <div class="current-temp" id="currentTemp"></div>
                <div class="weather-description" id="weatherDesc"></div>
                <div class="weather-details" id="weatherDetails"></div>
            </div>
        </div>

        <div id="forecastSection" class="forecast-section hidden">
            <div class="forecast-title">
                <i class="fas fa-calendar-days"></i>
                5-Day Forecast
            </div>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        // Weather API Configuration
        const API_KEY = 'e4ee5cf6a7c84f7ac14e9b2ad89ee14d'; // Free tier key for demo
        const API_BASE = 'https://api.openweathermap.org/data/2.5';

        // Get DOM elements
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const errorDiv = document.getElementById('error');
        const mainWeatherDiv = document.getElementById('mainWeather');
        const forecastSection = document.getElementById('forecastSection');
        const lastUpdatedDiv = document.getElementById('lastUpdated');

        // Event listeners
        searchBtn.addEventListener('click', () => searchWeather());
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });

        // Weather icons mapping
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '🌤️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌧️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            mainWeatherDiv.classList.add('hidden');
            forecastSection.classList.add('hidden');
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        async function searchWeather() {
            const city = cityInput.value.trim();
            if (!city) {
                showError('Please enter a city name!');
                return;
            }
            await fetchWeather(city);
        }

        function searchCity(city) {
            cityInput.value = city;
            fetchWeather(city);
        }

        async function fetchWeather(city) {
            try {
                errorDiv.style.display = 'none';
                mainWeatherDiv.classList.add('hidden');

                // Fetch current weather
                const response = await fetch(
                    `${API_BASE}/weather?q=${city}&units=metric&appid=${API_KEY}`
                );

                if (!response.ok) {
                    throw new Error('City not found');
                }

                const data = await response.json();
                displayCurrentWeather(data);

                // Fetch forecast
                const forecastResponse = await fetch(
                    `${API_BASE}/forecast?q=${city}&units=metric&appid=${API_KEY}`
                );
                const forecastData = await forecastResponse.json();
                displayForecast(forecastData);

                lastUpdatedDiv.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

            } catch (error) {
                showError(`Error: ${error.message}`);
            }
        }

        function displayCurrentWeather(data) {
            const { name, sys, main, weather, wind, clouds } = data;

            document.getElementById('cityName').textContent = 
                `${name}, ${sys.country}`;
            document.getElementById('currentTemp').textContent = 
                `${Math.round(main.temp)}°C`;
            document.getElementById('weatherDesc').textContent = 
                weather[0].description;
            document.getElementById('weatherIcon').textContent = 
                weatherIcons[weather[0].icon] || '🌤️';

            const detailsHTML = `
                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-water"></i> Humidity</div>
                    <div class="detail-value">${main.humidity}%</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-wind"></i> Wind Speed</div>
                    <div class="detail-value">${wind.speed} m/s</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-gauge"></i> Pressure</div>
                    <div class="detail-value">${main.pressure} hPa</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-cloud"></i> Cloudiness</div>
                    <div class="detail-value">${clouds.all}%</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-thermometer-half"></i> Feels Like</div>
                    <div class="detail-value">${Math.round(main.feels_like)}°C</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label"><i class="fas fa-expand"></i> UV Index</div>
                    <div class="detail-value">N/A</div>
                </div>
            `;

            document.getElementById('weatherDetails').innerHTML = detailsHTML;
            mainWeatherDiv.classList.remove('hidden');
        }

        function displayForecast(data) {
            const forecastList = data.list;
            const dailyForecasts = {};

            forecastList.forEach(item => {
                const date = new Date(item.dt * 1000);
                const day = date.toLocaleDateString();

                if (!dailyForecasts[day]) {
                    dailyForecasts[day] = item;
                }
            });

            let forecastHTML = '';
            let count = 0;

            for (const day in dailyForecasts) {
                if (count >= 5) break;
                const item = dailyForecasts[day];
                const date = new Date(item.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });

                forecastHTML += `
                    <div class="forecast-card">
                        <div class="forecast-day">${dayName}</div>
                        <div class="forecast-icon">${weatherIcons[item.weather[0].icon] || '🌤️'}</div>
                        <div class="forecast-temp">${Math.round(item.main.temp)}°C</div>
                        <div class="forecast-desc">${item.weather[0].description}</div>
                    </div>
                `;
                count++;
            }

            document.getElementById('forecastGrid').innerHTML = forecastHTML;
            forecastSection.classList.remove('hidden');
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            fetchWeather('Manila');
        });
    </script>

</body>
</html>
